openapi: 3.0.3
info:
  title: SocialPredict API
  version: 0.1.0
  description: >
    HTTP contract for the SocialPredict backend service. This spec is generated
    from the Go handlers and DTOs under backend/server and backend/handlers.
    Routes wrapped by the shared security middleware can return a shared
    transport-level `429 text/plain` response before reaching handler-specific
    JSON envelope logic when the rate limit is exceeded. Per-operation `429`
    responses document that middleware behavior where it applies.
servers:
  - url: http://localhost:8080
    description: Local dev server
tags:
  - name: Auth
    description: Authentication and session management.
  - name: Config
    description: Health and configuration endpoints.
  - name: Markets
    description: Market creation, listing, search, and resolution.
  - name: Bets
    description: Placing and selling bets.
  - name: Users
    description: Public and private user profile and financial data.
  - name: Metrics
    description: Platform-wide metrics and leaderboards.
  - name: Content
    description: CMS-powered homepage content.

paths:
  /health:
    get:
      operationId: getHealth
      tags: [Config]
      summary: Backend health check
      description: Simple liveness probe that returns "ok" when the backend is running.
      responses:
        '200':
          description: Backend is healthy.
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      tags: [Config]
      summary: Get the live OpenAPI document
      description: Returns the OpenAPI source served directly by the backend.
      responses:
        '200':
          description: OpenAPI document returned successfully.
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true

  /swagger:
    get:
      operationId: redirectSwaggerUI
      tags: [Config]
      summary: Redirect to Swagger UI
      description: Redirects clients to the embedded Swagger UI under `/swagger/`.
      responses:
        '301':
          description: Redirect to `/swagger/`.
          headers:
            Location:
              description: Redirect target for the Swagger UI.
              schema:
                type: string

  /swagger/:
    get:
      operationId: getSwaggerUI
      tags: [Config]
      summary: Serve Swagger UI
      description: Returns the embedded Swagger UI application for browsing the live OpenAPI document.
      responses:
        '200':
          description: Swagger UI returned successfully.
          content:
            text/html:
              schema:
                type: string

  /v0/login:
    post:
      operationId: loginUser
      tags: [Auth]
      summary: Authenticate user
      description: >
        Validates username and password and returns a JWT bearer token for subsequent
        authenticated requests. Users flagged for password rotation still receive the
        normal token plus `mustChangePassword: true`; server-side enforcement limits
        what they can do with it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '401':
          description: Invalid username or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidCredentials:
                  value:
                    ok: false
                    reason: INVALID_CREDENTIALS
        '500':
          description: Database access or token creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          description: Login rate limit exceeded by middleware. Other protected routes can also return middleware-level 429 responses as described in the API description.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/home:
    get:
      operationId: getBackendHome
      tags: [Config]
      summary: Backend home
      description: Returns a simple JSON message inside the shared success envelope to verify backend availability.
      responses:
        '200':
          description: Backend responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeEnvelopeResponse'

  /v0/setup:
    get:
      operationId: getSetupConfiguration
      tags: [Config]
      summary: Get economics configuration
      description: Returns the current economic configuration used by the backend. This route is public in the current backend implementation.
      responses:
        '200':
          description: Economics configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Economics'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/setup/frontend:
    get:
      operationId: getFrontendSetupConfiguration
      tags: [Config]
      summary: Get frontend configuration
      description: Returns minimal configuration values needed by the frontend, such as chart precision. This route is public in the current backend implementation.
      responses:
        '200':
          description: Frontend configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendConfig'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets:
    get:
      operationId: listMarkets
      tags: [Markets]
      summary: List markets
      description: >
        Returns markets with optional filtering by status and creator. When status is
        provided, results are backed by the status-specific listing path used by the
        live handler.
      parameters:
        - in: query
          name: status
          required: false
          description: >
            Filter by market status. Accepted values are active, closed, resolved, and all
            (or omitted for all markets).
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return. Malformed, non-positive, or out-of-range values fall back to the live default of 50.
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results. Malformed or negative values fall back to 0.
          schema:
            type: integer
        - in: query
          name: created_by
          required: false
          description: Only include markets created by the supplied username.
          schema:
            type: string
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid or unsupported status filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'
    post:
      operationId: createMarket
      tags: [Markets]
      summary: Create a market
      description: Creates a new prediction market for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketRequest'
      responses:
        '201':
          description: Market created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketResponse'
        '400':
          description: Request decoding failed, validation failed, or the creator lacks funds.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
                insufficientBalance:
                  value:
                    ok: false
                    reason: INSUFFICIENT_BALANCE
        '401':
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                authenticationRequired:
                  value:
                    ok: false
                    reason: AUTHENTICATION_REQUIRED
        '403':
          description: Password change required before creating markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                passwordChangeRequired:
                  value:
                    ok: false
                    reason: PASSWORD_CHANGE_REQUIRED
        '404':
          description: Authenticated user record could not be loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '500':
          description: Unexpected server error during market creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/search:
    get:
      operationId: searchMarkets
      tags: [Markets]
      summary: Search markets
      description: >
        Searches markets by question title with optional status filtering. Supports both
        "query" and legacy "q" parameters.
      parameters:
        - in: query
          name: query
          required: false
          description: Search query (preferred parameter name).
          schema:
            type: string
        - in: query
          name: q
          required: false
          description: Legacy search query parameter (used if "query" is not provided).
          schema:
            type: string
        - in: query
          name: status
          required: false
          description: Filter by market status; same accepted values as /v0/markets.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of primary results to return. Malformed, non-positive, or out-of-range values fall back to the live default of 20.
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Number of primary results to skip before collecting. Malformed or negative values fall back to 0.
          schema:
            type: integer
      responses:
        '200':
          description: Search completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Missing query parameter or invalid status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '500':
          description: Unexpected server error during search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/status:
    get:
      operationId: listAllMarketStatuses
      tags: [Markets]
      summary: List markets across all statuses
      description: Convenience endpoint equivalent to `/v0/markets?status=all`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return. Malformed, non-positive, or out-of-range values fall back to the live default of 100.
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results. Malformed or negative values fall back to 0.
          schema:
            type: integer
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/status/{status}:
    get:
      operationId: listMarketsByStatus
      tags: [Markets]
      summary: List markets by status
      description: Returns markets filtered by a specific lifecycle status.
      parameters:
        - in: path
          name: status
          required: true
          description: >
            Market status to filter by. Accepted values are active, closed, resolved, and all.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return. Malformed, non-positive, or out-of-range values fall back to the live default of 100.
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results. Malformed or negative values fall back to 0.
          schema:
            type: integer
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid or unsupported status value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/active:
    get:
      operationId: listLegacyActiveMarkets
      tags: [Markets]
      summary: Legacy active markets route
      description: Backward-compatible alias for `/v0/markets?status=active`.
      responses:
        '200':
          description: Active markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing active markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/closed:
    get:
      operationId: listLegacyClosedMarkets
      tags: [Markets]
      summary: Legacy closed markets route
      description: Backward-compatible alias for `/v0/markets?status=closed`.
      responses:
        '200':
          description: Closed markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing closed markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/resolved:
    get:
      operationId: listLegacyResolvedMarkets
      tags: [Markets]
      summary: Legacy resolved markets route
      description: Backward-compatible alias for `/v0/markets?status=resolved`.
      responses:
        '200':
          description: Resolved markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing resolved markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/{id}:
    get:
      operationId: getMarketDetails
      tags: [Markets]
      summary: Get market details
      description: >
        Fetches a single market by its identifier, including probability history and
        aggregate statistics.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Market returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDetailsResponse'
        '400':
          description: Invalid market ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '500':
          description: Unexpected server error while fetching market details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/{id}/resolve:
    post:
      operationId: resolveMarket
      tags: [Markets]
      summary: Resolve a market
      description: Sets the final outcome for a market once it has concluded.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market to resolve.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveMarketRequest'
      responses:
        '204':
          description: Market resolved successfully; no content is returned.
        '400':
          description: Invalid request body or validation failure in the resolution payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '401':
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                authenticationRequired:
                  value:
                    ok: false
                    reason: AUTHENTICATION_REQUIRED
        '403':
          description: Password change requirements or creator authorization block resolution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                passwordChangeRequired:
                  value:
                    ok: false
                    reason: PASSWORD_CHANGE_REQUIRED
                authorizationDenied:
                  value:
                    ok: false
                    reason: AUTHORIZATION_DENIED
        '404':
          description: Market or authenticated user record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '409':
          description: Market is already resolved or otherwise in an invalid state for resolution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '500':
          description: Unexpected server error during resolution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/{id}/leaderboard:
    get:
      operationId: getMarketLeaderboard
      tags: [Markets]
      summary: Get market leaderboard
      description: Ranks participants in a single market by profit and traded volume.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: false
          description: Maximum number of rows to return. Malformed, non-positive, or out-of-range values fall back to the live default of 100.
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Number of rows to skip before collecting results. Malformed or negative values fall back to 0.
          schema:
            type: integer
      responses:
        '200':
          description: Leaderboard returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketLeaderboardResponse'
        '400':
          description: Invalid market ID or pagination parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '500':
          description: Unexpected server error while computing leaderboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/markets/{id}/projection:
    get:
      operationId: projectMarketProbability
      tags: [Markets]
      summary: Project market probability
      description: >
        Computes the projected probability for a market after a hypothetical bet.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
        - in: query
          name: amount
          required: true
          description: Positive hypothetical stake amount.
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: outcome
          required: true
          description: Hypothetical outcome to buy. Canonical values are YES or NO.
          schema:
            type: string
      responses:
        '200':
          description: Projection computed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityProjectionResponse'
        '400':
          description: Invalid path/query parsing or validation failure in the projection inputs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '409':
          description: Market state no longer allows probability projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '500':
          description: Unexpected server error while computing projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

  /v0/marketprojection/{marketId}/{amount}/{outcome}:
    get:
      operationId: projectLegacyMarketProbability
      tags: [Markets]
      summary: Legacy market projection endpoint
      description: >
        Legacy route for computing a probability projection using path parameters
        instead of query parameters.
      parameters:
        - in: path
          name: marketId
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: amount
          required: true
          schema:
            type: integer
        - in: path
          name: outcome
          required: true
          description: Hypothetical outcome to buy. Canonical values are YES or NO.
          schema:
            type: string
      responses:
        '200':
          description: Projection computed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityProjectionResponse'
        '400':
          description: Invalid path parsing or validation failure in the projection inputs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    reason: NOT_FOUND
        '409':
          description: Market state no longer allows probability projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
