  /v0/admin/content/home:
    put:
      operationId: updateHomepageContent
      tags: [Content]
      summary: Update homepage content
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeContentUpdateRequest'
      responses:
        '200':
          description: Homepage content updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeContentUpdateEnvelopeResponse'
        '400':
          description: Invalid request body or update failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                invalidRequest:
                  value:
                    ok: false
                    reason: INVALID_REQUEST
                validationFailed:
                  value:
                    ok: false
                    reason: VALIDATION_FAILED
        '401':
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                authenticationRequired:
                  value:
                    ok: false
                    reason: AUTHENTICATION_REQUIRED
        '403':
          description: Admin privileges or password rotation requirements block the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                authorizationDenied:
                  value:
                    ok: false
                    reason: AUTHORIZATION_DENIED
                passwordChangeRequired:
                  value:
                    ok: false
                    reason: PASSWORD_CHANGE_REQUIRED
        '500':
          description: Unexpected server error while updating content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
              examples:
                internalError:
                  value:
                    ok: false
                    reason: INTERNAL_ERROR
        '429':
          $ref: '#/components/responses/MiddlewareRateLimitExceeded'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    MiddlewareRateLimitExceeded:
      description: Request rejected by shared rate-limiting middleware before handler-specific logic ran.
      content:
        text/plain:
          schema:
            $ref: '#/components/schemas/PlainTextErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    FailureReason:
      type: string
      description: |
        Canonical public failure reasons for the swept API routes covered by API-002 through API-008:
        - `METHOD_NOT_ALLOWED`: the route rejected the HTTP method before domain work ran.
        - `INVALID_REQUEST`: request JSON, path, or query input was malformed.
        - `VALIDATION_FAILED`: caller-supplied data failed validation or sanitization.
        - `AUTHENTICATION_REQUIRED`: a protected route was called without valid authentication.
        - `AUTHORIZATION_DENIED`: the caller is authenticated but lacks required privileges.
        - `PASSWORD_CHANGE_REQUIRED`: the caller must rotate their password before continuing.
        - `INVALID_CREDENTIALS`: submitted credentials were rejected during login or password checks.
        - `NOT_FOUND`: the requested user, market, content, or position target does not exist.
        - `MARKET_CLOSED`: market state prevents the requested market action.
        - `INSUFFICIENT_BALANCE`: accounting rules reject the requested action.
        - `INVALID_OUTCOME`: the supplied YES/NO outcome is not valid for the operation.
        - `NO_POSITION`: no eligible position exists for the requested sale.
        - `INSUFFICIENT_SHARES`: the sale exceeds the caller's held shares.
        - `DUST_CAP_EXCEEDED`: the requested sale would exceed the configured dust cap.
        - `INTERNAL_ERROR`: sanitized fallback for unexpected server-side failures.
      enum:
        - METHOD_NOT_ALLOWED
        - INVALID_REQUEST
        - VALIDATION_FAILED
        - AUTHENTICATION_REQUIRED
        - AUTHORIZATION_DENIED
        - PASSWORD_CHANGE_REQUIRED
        - INVALID_CREDENTIALS
        - NOT_FOUND
        - MARKET_CLOSED
        - INSUFFICIENT_BALANCE
        - INVALID_OUTCOME
        - NO_POSITION
        - INSUFFICIENT_SHARES
        - DUST_CAP_EXCEEDED
        - INTERNAL_ERROR
      example: VALIDATION_FAILED

    ReasonResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [false]
        reason:
          $ref: '#/components/schemas/FailureReason'
      required: [ok, reason]

    PlainTextErrorResponse:
      type: string
      description: Plain text error emitted by shared middleware before request-specific handlers run.

    HomeEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/HomeResponse'
      required: [ok, result]

    StatsEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/StatsResponse'
      required: [ok, result]

    MarketPositionsEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          type: array
          items:
            $ref: '#/components/schemas/UserPosition'
      required: [ok, result]

    UserPositionEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/UserPosition'
      required: [ok, result]

    PlaceBetEnvelopeResponse:
